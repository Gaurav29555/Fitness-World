server:
  port: ${PORT:8087}
spring:
  application:
    name: ai-service
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
ai:
  base-url: ${AI_BASE_URL:https://api.groq.com/openai/v1}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:llama-3.3-70b-versatile}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
