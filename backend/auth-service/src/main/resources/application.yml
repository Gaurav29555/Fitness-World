server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fitness_world}
    username: ${SPRING_DATASOURCE_USERNAME:fitness}
    password: ${SPRING_DATASOURCE_PASSWORD:fitness}
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        default_schema: auth
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    default-schema: auth
    schemas: auth

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}

security:
  jwt:
    issuer: fitness-world
    secret: ${JWT_SECRET:fitness-world-jwt-secret-should-be-32-bytes-minimum}
    access-token-minutes: 480

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
