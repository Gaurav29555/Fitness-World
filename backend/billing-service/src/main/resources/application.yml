server:
  port: ${PORT:8085}
spring:
  application:
    name: billing-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fitness_world}
    username: ${SPRING_DATASOURCE_USERNAME:fitness}
    password: ${SPRING_DATASOURCE_PASSWORD:fitness}
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        default_schema: billing
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    default-schema: billing
    schemas: billing
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
