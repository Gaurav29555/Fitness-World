databases:
  - name: fitness-world-db
    databaseName: fitness_world
    plan: basic-256mb
    postgresMajorVersion: '17'
    region: singapore

services:
  - name: fitness-world-discovery
    type: web
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: backend/discovery-service/Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: '8761'

  - name: fitness-world-ai
    type: web
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: backend/ai-service/Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: '8087'
      - key: DISCOVERY_HOSTPORT
        fromService:
          type: web
          name: fitness-world-discovery
          property: hostport
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: AI_MODEL
        value: llama-3.3-70b-versatile

  - name: fitness-world-notifications
    type: web
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: backend/notification-service/Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: '8086'
      - key: DISCOVERY_HOSTPORT
        fromService:
          type: web
          name: fitness-world-discovery
          property: hostport

  - name: fitness-world-auth
    type: web
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: backend/auth-service/Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: '8081'
      - key: DISCOVERY_HOSTPORT
        fromService:
          type: web
          name: fitness-world-discovery
          property: hostport
      - key: DATABASE_URL
        fromDatabase:
          name: fitness-world-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: fitness-world-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fitness-world-db
          property: password
      - key: JWT_SECRET
        generateValue: true

  - name: fitness-world-profile
    type: web
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: backend/profile-service/Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: '8082'
      - key: DISCOVERY_HOSTPORT
        fromService:
          type: web
          name: fitness-world-discovery
          property: hostport
      - key: DATABASE_URL
        fromDatabase:
          name: fitness-world-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: fitness-world-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fitness-world-db
          property: password

  - name: fitness-world-planning
    type: web
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: backend/planning-service/Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: '8083'
      - key: DISCOVERY_HOSTPORT
        fromService:
          type: web
          name: fitness-world-discovery
          property: hostport
      - key: AI_SERVICE_HOSTPORT
        fromService:
          type: web
          name: fitness-world-ai
          property: hostport
      - key: DATABASE_URL
        fromDatabase:
          name: fitness-world-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: fitness-world-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fitness-world-db
          property: password

  - name: fitness-world-progress
    type: web
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: backend/progress-service/Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: '8084'
      - key: DISCOVERY_HOSTPORT
        fromService:
          type: web
          name: fitness-world-discovery
          property: hostport
      - key: DATABASE_URL
        fromDatabase:
          name: fitness-world-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: fitness-world-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fitness-world-db
          property: password

  - name: fitness-world-billing
    type: web
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: backend/billing-service/Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: '8085'
      - key: DISCOVERY_HOSTPORT
        fromService:
          type: web
          name: fitness-world-discovery
          property: hostport
      - key: DATABASE_URL
        fromDatabase:
          name: fitness-world-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: fitness-world-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fitness-world-db
          property: password

  - name: fitness-world-api
    type: web
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: backend/api-gateway/Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: '8080'
      - key: DISCOVERY_HOSTPORT
        fromService:
          type: web
          name: fitness-world-discovery
          property: hostport
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
