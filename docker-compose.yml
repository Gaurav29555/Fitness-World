services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fitness_world
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  discovery-service:
    build:
      context: ./backend
      dockerfile: discovery-service/Dockerfile
    ports:
      - "8761:8761"

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    environment:
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      JWT_SECRET: fitness-world-jwt-secret-should-be-32-bytes-minimum
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    environment:
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fitness_world
      SPRING_DATASOURCE_USERNAME: fitness
      SPRING_DATASOURCE_PASSWORD: fitness
      JWT_SECRET: fitness-world-jwt-secret-should-be-32-bytes-minimum
    depends_on:
      - postgres
      - discovery-service

  profile-service:
    build:
      context: ./backend
      dockerfile: profile-service/Dockerfile
    environment:
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fitness_world
      SPRING_DATASOURCE_USERNAME: fitness
      SPRING_DATASOURCE_PASSWORD: fitness
    depends_on:
      - postgres
      - discovery-service

  planning-service:
    build:
      context: ./backend
      dockerfile: planning-service/Dockerfile
    environment:
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fitness_world
      SPRING_DATASOURCE_USERNAME: fitness
      SPRING_DATASOURCE_PASSWORD: fitness
      AI_SERVICE_URL: http://ai-service:8087
    depends_on:
      - postgres
      - discovery-service
      - ai-service

  progress-service:
    build:
      context: ./backend
      dockerfile: progress-service/Dockerfile
    environment:
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fitness_world
      SPRING_DATASOURCE_USERNAME: fitness
      SPRING_DATASOURCE_PASSWORD: fitness
    depends_on:
      - postgres
      - discovery-service

  billing-service:
    build:
      context: ./backend
      dockerfile: billing-service/Dockerfile
    environment:
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fitness_world
      SPRING_DATASOURCE_USERNAME: fitness
      SPRING_DATASOURCE_PASSWORD: fitness
    depends_on:
      - postgres
      - discovery-service

  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    environment:
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
    depends_on:
      - discovery-service

  ai-service:
    build:
      context: ./backend
      dockerfile: ai-service/Dockerfile
    environment:
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      AI_BASE_URL: ${AI_BASE_URL:-https://api.groq.com/openai/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-llama-3.3-70b-versatile}
    depends_on:
      - discovery-service

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: /api

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - api-gateway

volumes:
  postgres-data:
